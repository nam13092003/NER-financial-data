# ============================================================
# NER Token Classification — Default Configuration
# ============================================================
# Baseline Encoder → BIO Classification
#
# Run:
#   python train.py --config configs/default.yaml

# ── Model ────────────────────────────────────────────────────
model:
  # Pre-trained encoder backbone
  # Options:
  #   "FacebookAI/xlm-roberta-large"    ← high performance multilingual encoder
  #   "bert-base-uncased"               ← fast, good baseline
  #   "roberta-base"                    ← generally better than BERT
  #   "microsoft/deberta-v3-base"       ← state-of-the-art encoder
  name: "FacebookAI/xlm-roberta-large"
  max_seq_length: 256
  seed: 42

# ── Training ─────────────────────────────────────────────────
training:
  batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 1.5e-5
  epochs: 10
  weight_decay: 0.01
  warmup_ratio: 0.1
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  output_dir: "/kaggle/working/outputs_ner_token"

  # Number of eval loops without improvement before stopping (0 to disable)
  early_stopping_patience: 3

# ── Data ─────────────────────────────────────────────────────
# Each entry: path to a FIRE-format JSON file (JSON array of records)
data:
  train_files:
    - path: "/kaggle/input/fire-dataset/fire_train.json"
  eval_files:
    - path: "/kaggle/input/fire-dataset/fire_dev.json"
  test_files:
    - path: "/kaggle/input/fire-dataset/fire_test.json"
